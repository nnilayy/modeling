engine:
  name: "vllm_omni"
  command: "vllm-omni serve"

server:
  host: "0.0.0.0"
  port: 8091
  seed: 42
  trust_remote_code: true

memory:
  gpu_memory_utilization: 0.90

omni:
  enabled: true
  enforce_eager: true
  stage_configs_path: "fish_speech_s2_pro.yaml"
  stage_init_timeout: 600

parallelism:
  tensor_parallel_size: 1

logging:
  disable_log_stats: false
