engine:
  name: "vllm"
  command: "vllm serve"

server:
  host: "0.0.0.0"
  port: 8000
  seed: 42
  trust_remote_code: true

memory:
  gpu_memory_utilization: 0.95
  cpu_offload_gb: 0
  # kv_cache_dtype options:
  #   auto                — bf16/fp16 (most stable, lowest concurrency)
  #   fp8                 — 2× KV capacity but unstable with cudagraphs in vLLM 0.17
  #   turboquant_k8v4     — 2.6× compression, ~80-100% throughput (vLLM >= 0.20)
  #   turboquant_4bit_nc  — 3.8× compression, ~71-96% throughput
  #   turboquant_3bit_nc  — 4.9× compression, ~65-93% throughput (max)
  kv_cache_dtype: "turboquant_k8v4"

performance:
  enable_prefix_caching: true
  enable_chunked_prefill: true
  max_num_batched_tokens: 32768
  enable_prompt_tokens_details: true
  disable_frontend_multiprocessing: true
  max_num_seqs: 256
  async_scheduling: true

tool_calling:
  enable_auto_tool_choice: true
  tool_call_parser: "hermes"

chat_template:
  enable_thinking: false

parallelism:
  tensor_parallel_size: 1
  pipeline_parallel_size: 1

logging:
  disable_log_stats: false
