engine:
  name: "vllm"
  command: "vllm serve"

server:
  host: "0.0.0.0"
  port: 8000
  seed: 42
  trust_remote_code: true

memory:
  gpu_memory_utilization: 0.95  # ~4 GiB transient headroom on H100-80GB; >0.96 OOMs on burst.
  cpu_offload_gb: 0
  kv_cache_dtype: "fp8"  # ~2× concurrency on H100 vs auto/bf16, <1% quality loss.

performance:
  enable_prefix_caching: true
  enable_chunked_prefill: true
  max_num_batched_tokens: 16384  # FFN intermediate ~1.56 GiB at this size; 65536 OOMed.
  enable_prompt_tokens_details: true
  disable_frontend_multiprocessing: true
  max_num_seqs: 256  # Matches 256-prompt burst; KV pool is the real concurrency cap.
  async_scheduling: true  # Overlaps scheduler w/ GPU exec; vLLM 0.18+ default is true.

speculative_decoding:
  enabled: false
  method: "ngram_gpu"
  num_speculative_tokens: 5
  prompt_lookup_max: 4
  prompt_lookup_min: 2

tool_calling:
  enable_auto_tool_choice: true
  tool_call_parser: "hermes"

chat_template:
  enable_thinking: false

parallelism:
  tensor_parallel_size: 1
  pipeline_parallel_size: 1

logging:
  disable_log_stats: false
