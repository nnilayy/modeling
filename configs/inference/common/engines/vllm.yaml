engine:
  name: "vllm"
  command: "vllm serve"

server:
  host: "0.0.0.0"
  port: 8000
  seed: 42
  trust_remote_code: true

memory:
  gpu_memory_utilization: 0.95
  cpu_offload_gb: 0
  # kv_cache_dtype options:
  #   auto  — bf16/fp16 (most stable, lowest concurrency)
  #   fp8   — 2× KV capacity but unstable with cudagraphs in vLLM 0.17
  kv_cache_dtype: "auto"

performance:
  enable_prefix_caching: true
  enable_chunked_prefill: true
  max_num_batched_tokens: 32768
  enable_prompt_tokens_details: true
  disable_frontend_multiprocessing: true
  max_num_seqs: 256
  async_scheduling: true

# Speculative decoding settings.
# Method options:
#   ngram   — prompt-lookup, no draft model needed; best for repetitive output
#             (RAG, code completion). For novel generation expect 1.1-1.3x decode
#             speedup. Free to enable, no extra GPU memory.
#   eagle   — requires a separate draft model (eagle_model_path); 2-3x decode
#             speedup but adds memory + compilation overhead.
#   medusa  — multi-head drafting; needs medusa-tuned model.
# Set enabled: false to disable entirely.
speculative_decoding:
  enabled: true
  method: "ngram"
  num_speculative_tokens: 5
  prompt_lookup_max: 4
  prompt_lookup_min: 2

tool_calling:
  enable_auto_tool_choice: true
  tool_call_parser: "hermes"

chat_template:
  enable_thinking: false

parallelism:
  tensor_parallel_size: 1
  pipeline_parallel_size: 1

logging:
  disable_log_stats: false
