engine:
  name: "vllm"
  command: "vllm serve"

server:
  host: "0.0.0.0"
  port: 8000
  seed: 42
  trust_remote_code: true

memory:
  gpu_memory_utilization: 0.95
  cpu_offload_gb: 0
  # kv_cache_dtype options:
  #   auto  — bf16/fp16 (most stable, lowest concurrency)
  #   fp8   — 2× KV capacity but unstable with cudagraphs in vLLM 0.17
  kv_cache_dtype: "auto"

performance:
  enable_prefix_caching: true
  enable_chunked_prefill: true
  # Higher = more prefills admitted per scheduler iteration.
  # 65536 lets us admit 64 × 1k requests per iter (was 32) → halves admission
  # rounds for burst loads. Trade-off: slightly larger CUDA graphs.
  max_num_batched_tokens: 65536
  enable_prompt_tokens_details: true
  disable_frontend_multiprocessing: true
  max_num_seqs: 256
  async_scheduling: true
  # Force FlashInfer attention backend (already installed in venv).
  # On A100 SM 8.0, FlashInfer often outperforms FlashAttention 2 for
  # high-concurrency workloads. Set to null/false to use vLLM's default.
  attention_backend: "FLASHINFER"

# Speculative decoding settings.
# Method options:
#   ngram_gpu — GPU-resident prompt lookup, REQUIRED when async_scheduling is on
#               (vLLM 0.20+). For novel generation expect 1.1-1.3x decode
#               speedup. Free to enable, no extra GPU memory.
#   ngram     — CPU prompt lookup. INCOMPATIBLE with async_scheduling in 0.20+.
#   eagle     — requires a separate draft model (set `model:` to draft path);
#               2-3x decode speedup but adds memory + compilation overhead.
#   medusa    — multi-head drafting; needs medusa-tuned model.
# Set enabled: false to disable entirely.
speculative_decoding:
  enabled: false
  method: "ngram_gpu"
  num_speculative_tokens: 5
  prompt_lookup_max: 4
  prompt_lookup_min: 2

tool_calling:
  enable_auto_tool_choice: true
  tool_call_parser: "hermes"

chat_template:
  enable_thinking: false

parallelism:
  tensor_parallel_size: 1
  pipeline_parallel_size: 1

logging:
  disable_log_stats: false
