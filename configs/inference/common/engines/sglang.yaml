engine:
  name: "sglang"
  command: "python3 -m sglang.launch_server"

server:
  host: "0.0.0.0"
  port: 8000
  trust_remote_code: true

memory:
  mem_fraction_static: 0.80

performance:
  chunked_prefill_size: 8192
  schedule_policy: "lpm"

parallelism:
  tensor_parallel_size: 1

logging:
  log_level: "info"
