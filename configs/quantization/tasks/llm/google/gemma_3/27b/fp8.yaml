model:
  base: "google/gemma-3-27b-it"
  output: "nilay-samora/gemma3-27b-fp8"
  dtype: "bfloat16"
  model_class: "Gemma3ForConditionalGeneration"
  multimodal: true

recipe:
  method: "fp8"
  scheme: "FP8_DYNAMIC"
  targets: "Linear"
  ignore:
    - "re:.*lm_head"
    - "re:.*vision_tower.*"
    - "re:.*multi_modal_projector.*"
  smoothquant:
    enabled: false

calibration:
  enabled: false

offload:
  sequential_device: null

save:
  compressed: true

metadata:
  family: "gemma_3"
  provider: "google"
  params_billion: 27
  architecture: "dense"
  quantized_on: "A100-SXM4-40GB"
