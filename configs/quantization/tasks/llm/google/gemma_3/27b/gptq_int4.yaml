model:
  base: "google/gemma-3-27b-it"
  output: "nilay-samora/gemma3-27b-gptq-int4"
  dtype: "bfloat16"
  model_class: "Gemma3ForConditionalGeneration"
  multimodal: true

recipe:
  method: "gptq_int4"
  scheme: "W4A16"
  targets: "Linear"
  ignore:
    - "lm_head"
    - "re:model\\.vision_tower.*"
    - "re:model\\.multi_modal_projector.*"
  smoothquant:
    enabled: false

calibration:
  enabled: true
  dataset: "HuggingFaceH4/ultrachat_200k"
  split: "train_sft"
  num_samples: 512
  max_seq_length: 2048
  seed: 42

offload:
  sequential_device: "cpu"

save:
  compressed: true

metadata:
  family: "gemma_3"
  provider: "google"
  params_billion: 27
  architecture: "dense"
