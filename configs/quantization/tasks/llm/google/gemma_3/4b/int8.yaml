model:
  base: "google/gemma-3-4b-it"
  output: "nilay-samora/gemma3-4b-int8"
  dtype: "bfloat16"
  model_class: "Gemma3ForConditionalGeneration"
  multimodal: true

recipe:
  method: "int8"
  scheme: "W8A8"
  targets: "Linear"
  ignore:
    - "re:.*lm_head"
    - "re:.*vision_tower.*"
    - "re:.*multi_modal_projector.*"
  smoothquant:
    enabled: false

calibration:
  enabled: true
  dataset: "HuggingFaceH4/ultrachat_200k"
  split: "train_sft"
  num_samples: 512
  max_seq_length: 2048
  seed: 42

offload:
  sequential_device: null

save:
  compressed: true

metadata:
  family: "gemma_3"
  provider: "google"
  params_billion: 4
  architecture: "dense"
  quantized_on: "A100-SXM4-40GB"
