model:
  base: "google/gemma-3-12b-it"
  output: "nilay-samora/gemma3-12b-fp8"
  dtype: "bfloat16"
  model_class: "Gemma3ForConditionalGeneration"
  multimodal: true

recipe:
  method: "fp8"
  scheme: "FP8_DYNAMIC"
  targets: "Linear"
  ignore:
    - "lm_head"
    - "re:model\\.vision_tower.*"
    - "re:model\\.multi_modal_projector.*"
  smoothquant:
    enabled: false

calibration:
  enabled: false

offload:
  sequential_device: null

save:
  compressed: true

metadata:
  family: "gemma_3"
  provider: "google"
  params_billion: 12
  architecture: "dense"
