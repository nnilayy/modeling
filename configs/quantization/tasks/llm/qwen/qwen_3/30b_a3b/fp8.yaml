model:
  base: "Qwen/Qwen3-30B-A3B"
  output: "nilay-samora/qwen3-30b-a3b-fp8"
  dtype: "bfloat16"
  model_class: "Qwen3MoeForCausalLM"

recipe:
  method: "fp8"
  scheme: "FP8_DYNAMIC"
  targets: "Linear"
  ignore: ["lm_head", "re:.*mlp.gate$"]
  smoothquant:
    enabled: false

calibration:
  enabled: false

offload:
  sequential_device: "cpu"

save:
  compressed: true

metadata:
  family: "qwen_3"
  provider: "alibaba"
  params_billion: 30
  architecture: "moe"
