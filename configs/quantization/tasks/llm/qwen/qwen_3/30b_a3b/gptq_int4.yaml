model:
  base: "Qwen/Qwen3-30B-A3B"
  output: "nilay-samora/qwen3-30b-a3b-gptq-int4"
  dtype: "bfloat16"
  model_class: "Qwen3MoeForCausalLM"

recipe:
  method: "gptq_int4"
  scheme: "W4A16"
  targets: "Linear"
  ignore: ["lm_head", "re:.*mlp.gate$"]
  smoothquant:
    enabled: false

calibration:
  enabled: true
  dataset: "HuggingFaceH4/ultrachat_200k"
  split: "train_sft"
  num_samples: 512
  max_seq_length: 2048
  seed: 42

offload:
  sequential_device: "cpu"

save:
  compressed: true

metadata:
  family: "qwen_3"
  provider: "alibaba"
  params_billion: 30
  architecture: "moe"
