model:
  base: "Qwen/Qwen3-32B"
  output: "nilay-samora/qwen3-32b-fp8"
  dtype: "bfloat16"
  model_class: "Qwen3ForCausalLM"

recipe:
  method: "fp8"
  scheme: "FP8_DYNAMIC"
  targets: "Linear"
  ignore: ["lm_head", "re:.*mlp.gate$"]
  smoothquant:
    enabled: false

calibration:
  enabled: false

offload:
  sequential_device: "cpu"

save:
  compressed: true

metadata:
  family: "qwen_3"
  provider: "alibaba"
  params_billion: 32
  architecture: "dense"
  quantized_on: "A100-SXM4-40GB"
