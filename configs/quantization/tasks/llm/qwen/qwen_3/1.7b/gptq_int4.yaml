model:
  base: "Qwen/Qwen3-1.7B"
  output: "nilay-samora/qwen3-1.7b-gptq-int4"
  dtype: "bfloat16"
  model_class: "Qwen3ForCausalLM"

recipe:
  method: "gptq_int4"
  scheme: "W4A16"
  targets: "Linear"
  ignore: ["lm_head"]
  smoothquant:
    enabled: false

calibration:
  enabled: true
  dataset: "HuggingFaceH4/ultrachat_200k"
  split: "train_sft"
  num_samples: 512
  max_seq_length: 2048
  seed: 42

offload:
  sequential_device: "cpu"

save:
  compressed: true

metadata:
  family: "qwen_3"
  provider: "alibaba"
  params_billion: 1.7
  architecture: "dense"
  quantized_on: "A100-SXM4-40GB"
