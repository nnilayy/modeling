model:
  base: "Qwen/Qwen3-4B"
  output: "nilay-samora/qwen3-4b-awq-int4"
  dtype: "bfloat16"

recipe:
  method: "awq_int4"
  scheme: "W4A16_ASYM"
  targets: "Linear"
  ignore: ["lm_head"]
  smoothquant:
    enabled: false

calibration:
  enabled: true
  dataset: "HuggingFaceH4/ultrachat_200k"
  split: "train_sft"
  num_samples: 512
  max_seq_length: 2048
  seed: 42

offload:
  sequential_device: "cpu"

save:
  compressed: true

metadata:
  family: "qwen_3"
  provider: "alibaba"
  params_billion: 4
  architecture: "dense"
