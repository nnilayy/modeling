# Concurrency capacity evaluation.
#
# For each bucket the runner: starts a vLLM server with max_model_len sized for
# the bucket, fires `load.num_prompts` requests simultaneously, and polls the
# server's /metrics endpoint to capture peak `vllm:num_requests_running`.
#
# Driven by: evaluations/tasks/llm/concurrency_evaluation/run.py

dataset:
  hf_repo: "nnilayy/pg19-concurrency-bench"
  buckets:
    - "01k"
    - "02k"
    - "04k"
    - "08k"
    - "16k"
    - "32k"

request:
  endpoint: "/v1/chat/completions"
  max_completion_tokens: 32
  temperature: 0.0
  per_request_timeout_s: 600

load:
  num_prompts: 256
  warmup_requests: 1

server:
  startup_timeout_s: 900
  ready_poll_interval_s: 2.0
  shutdown_timeout_s: 30
  metrics_poll_interval_s: 0.1
  # Constant max_model_len for production-realistic measurement.
  # 36864 = 32768 (largest bucket) + 4096 headroom for chat-template overhead,
  # max_completion_tokens, and tokenizer variance.
  # vLLM allocates KV cache dynamically per request, so this does NOT waste
  # memory for smaller buckets — concurrency still scales with actual prompt size.
  max_model_len: 36864

output:
  dir: "results/concurrency"
